name: Container Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write
  attestations: write
  packages: write

jobs:
  image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: sigstore/cosign-installer@v4.1.2
        with:
          cosign-release: v3.0.6

      - uses: docker/metadata-action@v6
        id: meta
        with:
          images: ghcr.io/${{ github.repository_owner }}/igloo
          tags: |
            type=ref,event=tag
            type=raw,value=latest

      - uses: docker/build-push-action@v7
        id: build
        with:
          context: .
          push: true
          provenance: false
          sbom: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Sign container image keyless
        env:
          IMAGE_DIGEST: ghcr.io/${{ github.repository_owner }}/igloo@${{ steps.build.outputs.digest }}
        run: cosign sign --yes "$IMAGE_DIGEST"

      - name: Sign container image with release key
        env:
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
          IMAGE_DIGEST: ghcr.io/${{ github.repository_owner }}/igloo@${{ steps.build.outputs.digest }}
        run: |
          test -n "$COSIGN_PRIVATE_KEY"
          test -n "$COSIGN_PASSWORD"
          cosign sign --yes --key env://COSIGN_PRIVATE_KEY "$IMAGE_DIGEST"

      - name: Generate container attestation
        uses: actions/attest@v4
        with:
          subject-name: ghcr.io/${{ github.repository_owner }}/igloo
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
