name: Container Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write
  attestations: write
  packages: write

jobs:
  image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "26"

      - name: Run full release gate
        run: scripts/dev/test-full.sh

      - uses: DeterminateSystems/determinate-nix-action@v3

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: sigstore/cosign-installer@v4.1.2
        with:
          cosign-release: v3.0.6

      - uses: docker/metadata-action@v6
        id: meta
        with:
          images: ghcr.io/${{ github.repository_owner }}/igloo
          tags: |
            type=ref,event=tag
            type=raw,value=latest

      - name: Build Nix container image
        run: nix build .#container --print-build-logs

      - name: Load Nix container image
        run: docker load < result

      - name: Push container image
        id: build
        env:
          SOURCE_IMAGE: ghcr.io/screwys/igloo:latest
          TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          set -euo pipefail
          first_tag="$(printf '%s\n' "$TAGS" | head -n1)"
          while IFS= read -r tag; do
            test -n "$tag" || continue
            docker tag "$SOURCE_IMAGE" "$tag"
            docker push "$tag"
          done <<EOF
          $TAGS
          EOF
          digest="$(docker inspect --format='{{index .RepoDigests 0}}' "$first_tag" | sed 's/.*@//')"
          test -n "$digest"
          echo "digest=$digest" >> "$GITHUB_OUTPUT"

      - name: Sign container image keyless
        env:
          IMAGE_DIGEST: ghcr.io/${{ github.repository_owner }}/igloo@${{ steps.build.outputs.digest }}
        run: cosign sign --yes "$IMAGE_DIGEST"

      - name: Sign container image with release key
        env:
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
          IMAGE_DIGEST: ghcr.io/${{ github.repository_owner }}/igloo@${{ steps.build.outputs.digest }}
        run: |
          test -n "$COSIGN_PRIVATE_KEY"
          test -n "$COSIGN_PASSWORD"
          cosign sign --yes --key env://COSIGN_PRIVATE_KEY "$IMAGE_DIGEST"

      - name: Generate container attestation
        uses: actions/attest@v4
        with:
          subject-name: ghcr.io/${{ github.repository_owner }}/igloo
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
