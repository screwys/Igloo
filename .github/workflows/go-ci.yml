name: Go CI

on:
  push:
    paths-ignore:
      - "**/*.md"
  pull_request:
    paths-ignore:
      - "**/*.md"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Check generated drift
        run: scripts/dev/drift-check.sh

      - name: Check SQLite schema
        run: scripts/dev/schema-check.sh

      - name: Run Go tests
        run: go test ./...

      - name: Run errcheck
        run: go run github.com/kisielk/errcheck@latest ./...

      - name: Run staticcheck
        run: go run honnef.co/go/tools/cmd/staticcheck@latest ./...

      - name: Run govulncheck
        run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...

      - name: Run web smoke test
        run: scripts/dev/web-smoke.sh
