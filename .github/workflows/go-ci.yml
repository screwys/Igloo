name: Go CI

on:
  push:
    paths-ignore:
      - "**/*.md"
  pull_request:
    paths-ignore:
      - "**/*.md"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install media tools
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Check GitHub Actions pinning
        run: scripts/dev/workflow-pin-check.sh

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Check generated drift
        run: scripts/dev/drift-check.sh

      - name: Check SQLite schema
        run: scripts/dev/schema-check.sh

      - name: Run Go tests
        run: go test ./...

      - name: Run errcheck
        run: |
          . scripts/dev/go-tool-versions.sh
          go run "github.com/kisielk/errcheck@${ERRCHECK_VERSION}" ./...

      - name: Run staticcheck
        run: |
          . scripts/dev/go-tool-versions.sh
          go run "honnef.co/go/tools/cmd/staticcheck@${STATICCHECK_VERSION}" ./...

      - name: Run govulncheck
        run: |
          . scripts/dev/go-tool-versions.sh
          go run "golang.org/x/vuln/cmd/govulncheck@${GOVULNCHECK_VERSION}" ./...

      - name: Run web smoke test
        run: scripts/dev/web-smoke.sh
