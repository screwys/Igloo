services:
  igloo:
    image: ghcr.io/screwys/igloo:latest
    build:
      context: .
    restart: unless-stopped
    user: "${IGLOO_UID:-1000}:${IGLOO_GID:-1000}"
    read_only: true
    tmpfs:
      - /tmp:size=256m,mode=1777
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    mem_limit: ${IGLOO_MEM_LIMIT:-2g}
    cpus: "${IGLOO_CPUS:-2.0}"
    ports:
      - "127.0.0.1:${IGLOO_PORT:-5001}:5001"
    environment:
      IGLOO_ENABLED_PLATFORMS: ${IGLOO_ENABLED_PLATFORMS:-}
    volumes:
      - ./igloo:/igloo
