services:
  igloo:
    image: ghcr.io/screwys/igloo:latest
    build:
      context: .
    restart: unless-stopped
    user: "${IGLOO_UID:-1000}:${IGLOO_GID:-1000}"
    ports:
      - "${IGLOO_PORT:-5001}:5001"
    environment:
      IGLOO_ENABLED_PLATFORMS: ${IGLOO_ENABLED_PLATFORMS:-}
    volumes:
      - ./igloo:/igloo
